spring.application.name=fleetops-intelligence

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/fleetops}
spring.datasource.username=${DATABASE_USERNAME:fleetops}
spring.datasource.password=${DATABASE_PASSWORD:fleetops}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
